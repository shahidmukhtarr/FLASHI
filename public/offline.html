<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Flashi — Connection Issue</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 380px;
      animation: fadeIn 0.5s ease-out;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(46, 125, 50, 0.3);
    }
    .offline-icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
      animation: pulse 2s ease-in-out infinite;
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }
    .msg {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 32px;
      line-height: 1.7;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 40px;
      background: linear-gradient(135deg, #2e7d32, #4caf50);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(46, 125, 50, 0.35);
      transition: transform 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .retry-btn:active {
      transform: scale(0.96);
      box-shadow: 0 4px 15px rgba(46, 125, 50, 0.25);
    }
    .retry-btn.retrying {
      opacity: 0.7;
      pointer-events: none;
    }
    .retry-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .retry-btn.retrying .retry-spinner { display: inline-block; }
    .retry-btn.retrying .retry-label { display: none; }

    .tips {
      margin-top: 36px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .tips-heading {
      font-size: 11px;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
    }
    .tips ul { list-style: none; text-align: left; }
    .tips li {
      font-size: 13px;
      color: #94a3b8;
      padding: 5px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .tip-dot {
      width: 6px; height: 6px;
      background: #4caf50;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status {
      margin-top: 20px;
      font-size: 12px;
      color: #334155;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="offline-icon">📡</span>
    <img src="/logo.png" alt="Flashi" class="logo" onerror="this.style.display='none'" />
    <div class="title">Connection Issue</div>
    <p class="msg">
      Unable to connect to Flashi right now. This usually happens when your
      internet is weak or the server is waking up. Please try again in a moment.
    </p>
    <button class="retry-btn" id="retryBtn" onclick="retryConnection()">
      <span class="retry-label">↻ Try Again</span>
      <span class="retry-spinner"></span>
    </button>

    <div class="tips">
      <div class="tips-heading">Quick fixes</div>
      <ul>
        <li><span class="tip-dot"></span> Check your Wi-Fi or mobile data</li>
        <li><span class="tip-dot"></span> Turn airplane mode on and off</li>
        <li><span class="tip-dot"></span> Wait a few seconds and retry</li>
      </ul>
    </div>
    <div class="status" id="status"></div>
  </div>

  <script>
    var attempts = 0;

    function retryConnection() {
      var btn = document.getElementById('retryBtn');
      btn.classList.add('retrying');
      attempts++;
      document.getElementById('status').textContent = 'Connecting… (attempt ' + attempts + ')';

      // Try to reach the site
      fetch('/api/health', { cache: 'no-store' })
        .then(function(res) {
          if (res.ok) {
            // Server is back — reload the app
            window.location.replace('/');
          } else {
            throw new Error('not ok');
          }
        })
        .catch(function() {
          btn.classList.remove('retrying');
          document.getElementById('status').textContent = 'Still offline — tap retry again';
        });
    }

    // Auto-retry when device comes back online
    window.addEventListener('online', function() {
      retryConnection();
    });

    // Auto-retry once after 5 seconds (server might be cold-starting)
    setTimeout(function() {
      fetch('/api/health', { cache: 'no-store' })
        .then(function(res) {
          if (res.ok) window.location.replace('/');
        })
        .catch(function() {});
    }, 5000);
  </script>
</body>
</html>
